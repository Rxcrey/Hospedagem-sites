<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holy Bars | Holy and Bars</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="d-flex justify-content-center align-items-center">
    <img height="200" src="./imagens/logo Sfundo.png" alt=""></h1>
    </header>
    <main>
        <div class="col-12 col-md-6 mx-auto">
            <h2 class="text-dark text-center">Login</h2>
            <form class="border rounded-3 p-3 bg-light">
                <div class="mb-3 mt-3">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" class="form-control" id="email" placeholder="Informe seu email..." name="email">
                </div>
                <div class="mb-3">
                    <label for="pwd" class="form-label">Senha:</label>
                    <input type="password" class="form-control" id="pwd" placeholder="Informe sua senha..." name="pswd">
                </div>
                <div class="form-check mb-3">
                    <label class="form-check-label">
                        <input class="form-check-input" type="checkbox" name="remember"> Lembrar me
                    </label>
                </div>
                <a href="./prudutos.html"><button type="button" class="btn btn-primary w-100">Logar</button></a>
            </form>
        </div>
    </main>
</body>

</html>
